<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>만화 일정 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body class="text-white">
  <div id="authBar" class="w-full max-w-2xl mx-auto flex items-center justify-end gap-2 mb-4">
    <span id="userInfo" class="text-sm opacity-80"></span>
    <button id="signInBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded">Google 로그인</button>
    <button id="signOutBtn" class="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1 rounded hidden">로그아웃</button>
  </div>

  <div id="main-tabs" class="notepad-tabs mx-auto">
    <button class="notepad-tab active" data-tab="calendar">달력</button>
    <button class="notepad-tab" data-tab="notes">메모</button>
    <button class="notepad-tab" data-tab="bookmarks">북마크</button>
    <button class="notepad-tab" data-tab="workmusic">노동요</button>
    <button class="notepad-tab" data-tab="clipviewer">클립뷰어</button>
  </div>

  <div id="calendar-section" class="section-card tab-content active">
    <div class="flex justify-between items-center mb-4">
      <button id="prevMonthBtn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">&lt; 이전 달</button>
      <h2 id="currentMonthYear" class="text-lg font-bold"></h2>
      <button id="nextMonthBtn" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">다음 달 &gt;</button>
    </div>
    <div class="calendar-header mb-2">
      <div class="day-label">월</div><div class="day-label">화</div><div class="day-label">수</div>
      <div class="day-label">목</div><div class="day-label">금</div><div class="day-label">토</div><div class="day-label">일</div>
    </div>
    <div id="calendarGrid" class="calendar-grid"></div>

    <!-- (달력 아래 리스트) : 문구/추가버튼 제거, 항목만 표시 -->
    <div id="agendaPanel" class="mt-6 text-left" style="background:#1f1f1f;border-radius:12px;padding:14px;box-shadow:inset 0 0 10px rgba(0,0,0,.25)">
      <div id="agendaList" class="space-y-2"></div>
    </div>
  </div>

  <div id="notes-section" class="section-card tab-content">
    <div class="flex items-center justify-between mb-2" id="notesHeaderRow">
      <div id="notesTabsContainer" class="notepad-tabs flex flex-wrap gap-2"></div>
      <div class="flex items-center gap-2">
        <button id="addNotesTabBtn" class="icon-btn" title="새 탭">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 5v14"/><path d="M5 12h14"/>
          </svg>
        </button>
        <button id="downloadNotesBtn" class="icon-btn" title="메모 전체 다운로드">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <path d="M7 10l5 5 5-5"/>
            <path d="M12 15V3"/>
          </svg>
        </button>
        <button id="toggleNotesEditBtn" class="icon-btn" title="탭 편집">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>
      </div>
    </div>
    <textarea id="notesArea" class="w-full notes-area p-4 bg-black text-white border border-gray-700 focus:outline-none focus:ring-1 focus:ring-gray-500 rounded-lg"></textarea>
  </div>

  <div id="bookmarks-section" class="section-card tab-content text-left">
    <div class="flex items-center justify-between mb-2" id="bookmarkHeaderRow">
      <div id="bookmarkTabsContainer" class="notepad-tabs flex flex-wrap gap-2"></div>
      <div class="flex items-center gap-2">
        <button id="addBookmarkTabBtn" class="icon-btn" title="새 북마크 탭">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
        <button id="toggleBookmarkEditBtn" class="icon-btn" title="북마크 탭 편집">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
      </div>
    </div>
    <section id="drag-area" class="drag-area rounded-lg p-6 flex items-center justify-center text-center text-[#999] font-medium cursor-pointer" title="붙여넣기(Ctrl/Cmd+V)">
      <div class="text-4xl font-bold select-none">+</div>
    </section>
    <section id="image-grid"></section>
  </div>

  <div id="clipviewer-section" class="section-card tab-content text-left">
    <div class="clip-viewer-panel">
      <div class="clip-toolbar">
        <label class="clip-file-btn pc-only" title="CLIP 폴더 열기">
          <input id="clipFolderInput" type="file" webkitdirectory directory multiple />
          📂 폴더 열기
        </label>
        <button id="clipRefreshBtn" class="clip-btn pc-only" type="button">🔄 다시 읽기</button>
        <button id="clipUploadDriveBtn" class="clip-btn pc-only" type="button">☁️ Drive 업로드</button>
        <button id="clipLoadDriveBtn" class="clip-btn" type="button">📥 Drive 최신보기</button>
        <button id="clipClearBtn" class="clip-btn" type="button">🗑 초기화</button>
      </div>
      <div id="clipStatus" class="clip-status">PC에서는 CLIP 폴더를 열고 Drive 업로드를 누르세요.\n폰/다른 기기에서는 로그인하면 최신 Drive 원고가 자동으로 표시됩니다.</div>
      <div id="clipMessage" class="clip-message">CLIP 파일이 들어있는 폴더를 선택하세요.</div>
      <div id="clipViewer" class="clip-viewer"></div>
    </div>
  </div>


  <div id="workmusic-section" class="section-card tab-content text-left">
    <div class="workmusic-panel">
      <div class="flex items-center justify-between mb-2" id="workmusicHeaderRow">
        <div id="workmusicTabsContainer" class="notepad-tabs flex flex-wrap gap-2"></div>
        <div class="flex items-center gap-2">
          <button id="addWorkMusicTabBtn" class="icon-btn" title="새 노동요 탭">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </button>
          <button id="importWorkMusicPlaylistBtn" class="icon-btn" title="유튜브/유튜브뮤직 재생목록 가져오기">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h12"/><path d="M3 12h10"/><path d="M3 18h8"/><path d="M17 10v8"/><path d="M13 14h8"/></svg>
          </button>
          <button id="toggleWorkMusicEditBtn" class="icon-btn" title="노동요 탭 편집">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
        </div>
      </div>
      <section id="workmusic-drag-area" class="drag-area rounded-lg p-6 flex items-center justify-center text-center text-[#999] font-medium cursor-pointer" tabindex="0" title="유튜브 링크 붙여넣기(Ctrl/Cmd+V)">
        <div class="text-4xl font-bold select-none">+</div>
      </section>
      <div class="workmusic-player-wrap">
        <div id="workMusicPlayerBox"></div>
      </div>
      <div class="workmusic-controls">
        <button id="workMusicPrevBtn" class="workmusic-icon-btn" title="이전 재생" aria-label="이전 재생">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 5h2v14H6zM19 6.2v11.6c0 .8-.9 1.3-1.6.8L9.2 12l8.2-6.6c.7-.5 1.6 0 1.6.8z"/></svg>
        </button>
        <button id="workMusicPlayBtn" class="workmusic-icon-btn" title="재생" aria-label="재생">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="workMusicNextBtn" class="workmusic-icon-btn" title="다음 재생" aria-label="다음 재생">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 5h2v14h-2zM5 6.2v11.6c0 .8.9 1.3 1.6.8l8.2-6.6-8.2-6.6c-.7-.5-1.6 0-1.6.8z"/></svg>
        </button>
        <button id="workMusicModeBtn" class="workmusic-icon-btn" title="랜덤 재생 전환" aria-label="랜덤 재생 전환">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
        </button>
        <div class="workmusic-volume" title="볼륨">
          <button id="workMusicMuteBtn" class="workmusic-volume-btn" type="button" title="음소거" aria-label="음소거">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a10 10 0 0 1 0 14"/></svg>
          </button>
          <input id="workMusicVolumeRange" type="range" min="0" max="100" step="5" value="80"/>
          <span id="workMusicVolumePercent" class="workmusic-volume-percent">80%</span>
        </div>
      </div>
      <div id="workMusicList" class="workmusic-list"></div>
    </div>
  </div>

  <div id="workMusicSettingsModal" class="modal">
    <div class="modal-content workmusic-settings-modal">
      <input type="text" id="workMusicTitleInput" class="workmusic-title-input" placeholder="제목 수정">
      <div class="workmusic-settings-icons">
        <button id="workMusicOpenYoutubeBtn" class="workmusic-modal-icon-btn" title="유튜브에서 보기" aria-label="유튜브에서 보기">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          </svg>
        </button>
        <button id="workMusicDeleteBtn" class="workmusic-modal-icon-btn danger" title="영상 삭제" aria-label="영상 삭제">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="taskModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" class="text-2xl font-bold mb-4">새 작업</h2>
      <label class="block mb-2">제목:</label>
      <input type="text" id="taskTitle" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 mb-4">
      <label class="block mb-2">설명:</label>
      <textarea id="taskDescription" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 mb-4 h-24"></textarea>
      <label class="block mb-2">날짜:</label>
      <input type="date" id="taskDate" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 mb-4">

      <label class="block mb-2">분류:</label>
      <select id="taskCategory" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 mb-4">
        <option value="">(기본)</option>
        <option value="important">중요한일 (빨강)</option>
        <option value="family">가족행사 (파랑)</option>
        <option value="special">특별한날 (초록)</option>
      </select>

      <label class="flex items-center gap-2 mb-4 text-sm opacity-90" style="user-select:none;">
        <input type="checkbox" id="todoOnly" />
        달력에는 표시하지 않고 <b>할 일</b>로만 추가
      </label>
      <div class="flex justify-end gap-2">
        <button id="saveTaskBtn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">저장</button>
        <button id="cancelBtn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">취소</button>
        <button id="deleteTaskBtn" class="bg-gray-700 hover:bg-gray-800 text-white font-bold py-2 px-4 rounded-lg hidden">삭제</button>
      </div>
    </div>
  </div>

  <div id="imageModal" class="modal">
    <div class="modal-content relative">
      <div id="imageModalControls">
        <button id="moveBookmarkTabBtn" class="image-modal-icon-btn" title="탭 이동" aria-label="탭 이동">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7h7"/><path d="M3 12h7"/><path d="M3 17h7"/>
            <path d="M14 8l4 4-4 4"/><path d="M18 12H11"/>
          </svg>
        </button>
        <button id="openImageNewTabBtn" class="image-modal-icon-btn" title="새 탭에서 열기" aria-label="새 탭에서 열기">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          </svg>
        </button>
        <button id="closeImageModalBtn" class="image-modal-icon-btn" title="닫기" aria-label="닫기">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          </svg>
        </button>
        <select id="moveBookmarkTabSelect" title="이동할 탭 선택" aria-label="이동할 탭 선택"></select>
      </div>
      <img id="modalImage" src="" alt="확대 이미지" />
      <button id="goToPageBtn" style="display:none"></button>
    </div>
  </div>

  <div id="editTitleModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold mb-4">북마크 제목 수정</h2>
      <label class="block mb-2 text-sm opacity-80" id="currentUrlDisplay"></label>
      <input type="text" id="editTitleInput" class="w-full p-2 rounded-lg bg-gray-800 border border-gray-700 mb-4 text-white">
      <div class="flex justify-end gap-2">
        <button id="saveTitleBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">저장</button>
        <button id="cancelTitleBtn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">취소</button>
      </div>
    </div>
  </div>

  <!-- 링크 북마크 미리보기 이미지 업로드(붙여넣기 전용) 모달 -->
  <div id="previewUploadModal" class="modal">
    <div class="modal-content" style="background:#2a2a2a;max-width:420px;">
      <h2 class="text-xl font-bold mb-3">미리보기 이미지</h2>
      <p class="text-sm opacity-80 mb-4">캡쳐한 이미지를 이 창에서 <b>붙여넣기(Ctrl/Cmd+V)</b> 하세요.</p>
      <div id="previewPasteArea" class="drag-area rounded-lg p-10 flex items-center justify-center text-center cursor-default" style="border-style:dashed;">
        <div class="text-5xl font-bold select-none">+</div>
      </div>
      <div class="mt-3 text-xs opacity-70">캡쳐한 이미지를 이 화면에서 붙여넣기(Ctrl/Cmd+V) 해주세요.</div>
      <div class="flex justify-end gap-2 mt-4">
        <button id="closePreviewUploadBtn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg">닫기</button>
      </div>
    </div>
  </div>


  <div id="workMusicTabSettingsModal" class="modal">
    <div class="modal-content workmusic-tab-modal">
      <input type="text" id="workMusicTabNameInput" class="workmusic-title-input" placeholder="탭 이름 수정">
      <div class="workmusic-tab-modal-icons">
        <button id="workMusicTabRefreshBtn" class="workmusic-modal-icon-btn" title="재생목록 새로고침" aria-label="재생목록 새로고침">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.5 6.3"/><path d="M3 12A9 9 0 0 1 18.5 5.7"/><path d="M18 2v4h-4"/><path d="M6 22v-4h4"/>
          </svg>
        </button>
        <button id="workMusicTabSaveBtn" class="workmusic-modal-icon-btn" title="탭 이름 저장" aria-label="탭 이름 저장">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="workMusicRemote" class="workmusic-remote" aria-label="노동요 리모컨">
    <div id="workMusicRemoteInfo" class="workmusic-remote-info" title="노동요 탭으로 이동">
      <img id="workMusicRemoteThumb" class="workmusic-remote-thumb" src="" alt="현재 곡 썸네일">
      <div class="workmusic-remote-text">
        <div id="workMusicRemoteTitle" class="workmusic-remote-title">재생 중인 노동요 없음</div>
        <div id="workMusicRemoteArtist" class="workmusic-remote-artist"></div>
      </div>
    </div>
    <div class="workmusic-remote-controls">
      <button id="workMusicRemotePrevBtn" class="workmusic-remote-btn" title="이전 재생" aria-label="이전 재생">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 5h2v14H6zM19 6.2v11.6c0 .8-.9 1.3-1.6.8L9.2 12l8.2-6.6c.7-.5 1.6 0 1.6.8z"/></svg>
      </button>
      <button id="workMusicRemotePlayBtn" class="workmusic-remote-btn" title="재생" aria-label="재생">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button id="workMusicRemoteNextBtn" class="workmusic-remote-btn" title="다음 재생" aria-label="다음 재생">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 5h2v14h-2zM5 6.2v11.6c0 .8.9 1.3 1.6.8l8.2-6.6-8.2-6.6c-.7-.5-1.6 0-1.6.8z"/></svg>
      </button>
    </div>
    <div class="workmusic-remote-volume" title="볼륨">
      <button id="workMusicRemoteMuteBtn" class="workmusic-volume-btn" type="button" title="음소거" aria-label="음소거">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a10 10 0 0 1 0 14"/></svg>
      </button>
      <input id="workMusicRemoteVolumeRange" type="range" min="0" max="100" step="5" value="80">
      <span id="workMusicRemoteVolumePercent" class="workmusic-remote-percent">80%</span>
    </div>
  </div>

<script>
  // Google Drive 저장 방식 버전
    const APP_CONFIG = window.APP_CONFIG || {};
    
    // 전역 상태
    window.customTasks = window.customTasks || [];
    window.taskStatus = window.taskStatus || {};
    window.__notesTabs = window.__notesTabs || {};
    window.imageBookmarks = window.imageBookmarks || []; // 북마크는 이미지와 동영상, 일반 링크 모두 포함
    window.__bookmarkTabList = window.__bookmarkTabList || [{id:"default", name:"기본", order:0}];
    window.__bookmarkActiveTabId = window.__bookmarkActiveTabId || "default";
    window.currentTask = null;
    window.currentEditingBookmark = null; // 현재 편집 중인 북마크 항목
    window.workMusicSongs = window.workMusicSongs || [];
    window.__workMusicTabList = window.__workMusicTabList || [{id:'default', name:'기본', order:0}];
    window.__workMusicActiveTabId = window.__workMusicActiveTabId || 'default';
    window.workMusicMode = window.workMusicMode || 'sequential';
    window.workMusicCurrentIndex = window.workMusicCurrentIndex || 0;
    window.workMusicVolume = window.workMusicVolume ?? 80;
    window.workMusicLastVolume = window.workMusicLastVolume ?? (Number(window.workMusicVolume) > 0 ? Number(window.workMusicVolume) : 80);
    window.workMusicIsMuted = window.workMusicIsMuted || Number(window.workMusicVolume) === 0;
    // YouTube Data API v3 키: 재생목록/영상 제목/길이 조회용
    const YOUTUBE_API_KEY = APP_CONFIG.youtubeApiKey || '';
    window.workMusicIsPlaying = window.workMusicIsPlaying || false;
    window.currentWorkMusicSettingIndex = null;
    window.isAuthReady = false;
    // 북마크는 최신순 고정(정렬 UI 제거)
    window.bookmarkSortKey = 'timestamp';

    // DOM 요소
    const tabButtons = document.querySelectorAll('#main-tabs .notepad-tab');
    const tabContents = document.querySelectorAll('.tab-content');
    // 메모 탭 UI는 notes.js가 관리 (여기서는 관여하지 않음)
    const notesArea = document.getElementById('notesArea');
    const dragArea = document.getElementById('drag-area');
    const imageGrid = document.getElementById('image-grid');
    const imageModal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const closeImageModalBtn = document.getElementById('closeImageModalBtn');
    const goToPageBtn = document.getElementById('goToPageBtn');
    const openImageNewTabBtn = document.getElementById('openImageNewTabBtn');
    const moveBookmarkTabSelect = document.getElementById('moveBookmarkTabSelect');
    const moveBookmarkTabBtn = document.getElementById('moveBookmarkTabBtn');
    let currentModalBookmark = null;
    // 제목 수정 모달 요소
    const editTitleModal = document.getElementById('editTitleModal');
    const editTitleInput = document.getElementById('editTitleInput');
    const saveTitleBtn = document.getElementById('saveTitleBtn');
    const cancelTitleBtn = document.getElementById('cancelTitleBtn');
    const currentUrlDisplay = document.getElementById('currentUrlDisplay');
    // 정렬 선택 요소(현재는 UI 제거됨)
    const bookmarkSortSelect = document.getElementById('bookmarkSortSelect');
    const workMusicTabsContainer = document.getElementById('workmusicTabsContainer');
    const addWorkMusicTabBtn = document.getElementById('addWorkMusicTabBtn');
    const importWorkMusicPlaylistBtn = document.getElementById('importWorkMusicPlaylistBtn');
    const toggleWorkMusicEditBtn = document.getElementById('toggleWorkMusicEditBtn');
    const workMusicDragArea = document.getElementById('workmusic-drag-area');
    const workMusicPrevBtn = document.getElementById('workMusicPrevBtn');
    const workMusicPlayBtn = document.getElementById('workMusicPlayBtn');
    const workMusicNextBtn = document.getElementById('workMusicNextBtn');
    const workMusicModeBtn = document.getElementById('workMusicModeBtn');
    const workMusicMuteBtn = document.getElementById('workMusicMuteBtn');
    const workMusicVolumeRange = document.getElementById('workMusicVolumeRange');
    const workMusicVolumePercent = document.getElementById('workMusicVolumePercent');
    const workMusicList = document.getElementById('workMusicList');
    const workMusicSettingsModal = document.getElementById('workMusicSettingsModal');
    const workMusicTitleInput = document.getElementById('workMusicTitleInput');
    const workMusicSaveTitleBtn = document.getElementById('workMusicSaveTitleBtn');
    const workMusicOpenYoutubeBtn = document.getElementById('workMusicOpenYoutubeBtn');
    const workMusicDeleteBtn = document.getElementById('workMusicDeleteBtn');
    const workMusicCloseSettingsBtn = document.getElementById('workMusicCloseSettingsBtn');
    const workMusicRemote = document.getElementById('workMusicRemote');
    const workMusicRemoteInfo = document.getElementById('workMusicRemoteInfo');
    const workMusicRemoteThumb = document.getElementById('workMusicRemoteThumb');
    const workMusicRemoteTitle = document.getElementById('workMusicRemoteTitle');
    const workMusicRemoteArtist = document.getElementById('workMusicRemoteArtist');
    const workMusicRemotePrevBtn = document.getElementById('workMusicRemotePrevBtn');
    const workMusicRemotePlayBtn = document.getElementById('workMusicRemotePlayBtn');
    const workMusicRemoteNextBtn = document.getElementById('workMusicRemoteNextBtn');
    const workMusicRemoteMuteBtn = document.getElementById('workMusicRemoteMuteBtn');
    const workMusicRemoteVolumeRange = document.getElementById('workMusicRemoteVolumeRange');
    const workMusicRemoteVolumePercent = document.getElementById('workMusicRemoteVolumePercent');
    const workMusicTabSettingsModal = document.getElementById('workMusicTabSettingsModal');
    const workMusicTabNameInput = document.getElementById('workMusicTabNameInput');
    const workMusicTabRefreshBtn = document.getElementById('workMusicTabRefreshBtn');
    const workMusicTabSaveBtn = document.getElementById('workMusicTabSaveBtn');
    let workMusicIframe = null;
    let workMusicPlayer = null;
    let workMusicSyncTimer = null;
    let workMusicDurationSaveTimer = null;
    window.workMusicCurrentPlayOrder = window.workMusicCurrentPlayOrder || [];

    // 링크 미리보기(붙여넣기) 모달
    const previewUploadModal = document.getElementById('previewUploadModal');
    const closePreviewUploadBtn = document.getElementById('closePreviewUploadBtn');
    let currentPreviewEditingBookmark = null;

    const previewPasteArea = document.getElementById('previewPasteArea');
// 유틸리티 함수
    const showFeedbackMessage = (message) => {
      const el = document.createElement('div');
      el.textContent = message;
      el.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:16px 20px;border-radius:10px;z-index:2000;max-width:90%";
      document.body.appendChild(el); setTimeout(()=>el.remove(),2000);
    };
    const showAlert = (msg) => { document.getElementById('modal-message').textContent = msg; document.getElementById('alert-modal').classList.remove('hidden'); };
    const hideAlert = () => { document.getElementById('alert-modal').classList.add('hidden'); };
    window.showFeedbackMessage = showFeedbackMessage;
    window.showAlert = showAlert;
    document.getElementById('modal-close-btn').addEventListener('click', hideAlert);

    const openImageModal = (imageUrl, pageUrl, bookmark=null) => {
      currentModalBookmark = bookmark;
      modalImage.src = imageUrl;
      if (openImageNewTabBtn){ openImageNewTabBtn.onclick=()=>window.open(imageUrl,'_blank'); }
      if (moveBookmarkTabSelect){
        const tabs = [...(window.__bookmarkTabList||[{id:'default',name:'기본',order:0}])].sort((a,b)=>(a.order??0)-(b.order??0));
        moveBookmarkTabSelect.innerHTML = tabs.map(t=>`<option value="${t.id}">${t.name||'탭'}</option>`).join('');
        moveBookmarkTabSelect.value = bookmark?.bookmarkTabId || 'default';
      }
      if (goToPageBtn) goToPageBtn.style.display='none';
      const controls = document.getElementById('imageModalControls');
      controls?.classList.remove('move-open');
      imageModal.style.display='flex';
    };
    const closeImageModal = () => { imageModal.style.display = 'none'; currentModalBookmark=null; };

    // 북마크 제목 수정 모달
    const openEditModal = (bookmark) => {
        window.currentEditingBookmark = bookmark;
        const currentTitle = bookmark.title || '';
        const displayUrl = bookmark.pageUrl.length > 50 ? bookmark.pageUrl.substring(0, 47) + '...' : bookmark.pageUrl;
        
        currentUrlDisplay.textContent = `URL: ${displayUrl}`;
        editTitleInput.value = currentTitle;
        editTitleModal.style.display = 'flex';
    };

    const closeEditModal = () => {
        window.currentEditingBookmark = null;
        editTitleModal.style.display = 'none';
    };

    const saveEditedTitle = async () => {
        if (!window.currentEditingBookmark || !window.ensureLogin()) return;

        const newTitle = editTitleInput.value.trim();
        const bookmark = window.currentEditingBookmark;

        if (bookmark.type === 'link' || bookmark.type === 'video' || bookmark.type === 'instagram') {
            await window.updateBookmarkTitle(bookmark.id, newTitle);
        }
        
        closeEditModal();
        showFeedbackMessage('제목이 저장되었습니다.');
        renderImageBookmarks();
    };


    function showTab(tabId){
      tabContents.forEach(c=>c.classList.remove('active'));
      tabButtons.forEach(b=>b.classList.remove('active'));
      document.getElementById(`${tabId}-section`).classList.add('active');
      const btn=document.querySelector(`#main-tabs .notepad-tab[data-tab="${tabId}"]`); if(btn) btn.classList.add('active');
    }
    showTab('calendar');
    tabButtons.forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));
    // (주의) 과거 메모 탭 선택 로직은 제거됨. notes.js가 담당.

    const attachEventListeners=()=>{
      closeImageModalBtn.addEventListener('click', closeImageModal);
      imageModal.addEventListener('click',(e)=>{ if(e.target===imageModal) closeImageModal(); });
      document.querySelector('#imageModal .modal-content').addEventListener('click', (e) => {
          if (!e.target.closest('#imageModalControls')) {
              closeImageModal();
          }
      });

      moveBookmarkTabBtn?.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(!currentModalBookmark || !moveBookmarkTabSelect) return;
        document.getElementById('imageModalControls')?.classList.toggle('move-open');
      });
      moveBookmarkTabSelect?.addEventListener('click', (e)=>e.stopPropagation());
      moveBookmarkTabSelect?.addEventListener('change', async (e)=>{
        e.stopPropagation();
        if(!currentModalBookmark || !moveBookmarkTabSelect) return;
        const nextTabId = moveBookmarkTabSelect.value || 'default';
        if(window.moveBookmarkToTab){
          await window.moveBookmarkToTab(currentModalBookmark.id, nextTabId);
          currentModalBookmark.bookmarkTabId = nextTabId;
          showFeedbackMessage('탭을 이동했습니다.');
          closeImageModal();
        }
      });

      cancelTitleBtn.addEventListener('click', closeEditModal);
      saveTitleBtn.addEventListener('click', saveEditedTitle);
      editTitleModal.addEventListener('click', (e) => { if (e.target === editTitleModal) closeEditModal(); });
      editTitleInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
              e.preventDefault();
              saveEditedTitle();
          }
      });
    };

    // 유튜브 썸네일 URL 추출
    function getYoutubeThumbnail(url) {
        let videoId = null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        if (match && match[2].length === 11) {
            videoId = match[2];
        }
        if (videoId) {
            return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
        }
        return null;
    }
    
    // 인스타그램 임베드 스크립트를 로드하고 콘텐츠를 처리하는 함수
    function initializeInstagramEmbeds() {
        if (window.instgrm && window.instgrm.Embeds) {
            // 스크립트가 이미 로드된 경우, 새 게시물을 처리
            window.instgrm.Embeds.process();
            return;
        }

        // 스크립트 로드
        const scriptId = 'instagram-embed-script';
        if (!document.getElementById(scriptId)) {
            const script = document.createElement('script');
            script.id = scriptId;
            script.async = true;
            script.src = '//www.instagram.com/embed.js';
            document.head.appendChild(script);
            
            // 스크립트 로드 후에도 process를 한 번 더 호출할 수 있도록 window에 핸들러 등록
            script.onload = () => {
                if (window.instgrm && window.instgrm.Embeds) {
                    window.instgrm.Embeds.process();
                }
            };
        }
    }

    // 북마크 렌더링 (이미지 및 동영상 포함)
    const renderImageBookmarks=()=>{
      imageGrid.innerHTML='';
      
      const activeBookmarkTabId = window.__bookmarkActiveTabId || 'default';
      let sortedBookmarks = [...(window.imageBookmarks || [])].filter(d => (d.bookmarkTabId || 'default') === activeBookmarkTabId);

      // 최신순 고정
      sortedBookmarks.sort((a, b) => ((b.timestamp?.toMillis?.() || b.timestampMs || 0) - (a.timestamp?.toMillis?.() || a.timestampMs || 0)));

      sortedBookmarks.forEach(d=>{
        const isVideo = d.type === 'video';
        const isLink = d.type === 'link'; // 일반 페이지 링크
        const isInstagram = d.type === 'instagram'; // 인스타그램 게시물
        const isImage = d.type === 'drive_image' || d.type === 'remote' || !!d.driveFileId;
        
        const isEditable = isVideo || isLink || isInstagram; // 제목 수정 가능한 항목
        const imageUrl = d.url;
        const pageUrl = d.pageUrl; // 일반 URL, 동영상 URL 또는 인스타그램 게시물 URL
        const sourceDomain = d.sourceDomain || 'Unknown Source';

        // (사이트별 헤더 제거)
        
        let thumbnail = isVideo ? getYoutubeThumbnail(pageUrl) : imageUrl;
        let iconHtml = '';
        let urlToOpen = pageUrl;

        if (isLink) {
            // 일반 페이지 링크 북마크: 제목/URL 미표시. previewImageUrl이 있으면 그 이미지만 표시.
            const prevImg = d.previewImageUrl || null;
            if (prevImg) {
                iconHtml = `<img src="${prevImg}" alt="링크 미리보기" loading="lazy" decoding="async" class="img-fit-cover" onerror="this.onerror=null;this.src='https://placehold.co/100x120/444/fff?text=미리보기+오류'"/>`;
            } else {
                iconHtml = `<div class="icon-overlay">
                              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px;opacity:.9">
                                <path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 4"/>
                                <path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L13 20"/>
                              </svg>
                            </div>`;
            }
        } else if (isInstagram) {
             // 인스타그램 게시물 북마크 (퍼가기 코드 사용)
             // 원본 URL 추출 (클릭 시 이동용)
             const parser = new DOMParser();
             const doc = parser.parseFromString(d.embedCode || '', 'text/html');
             const blockquote = doc.querySelector('blockquote.instagram-media');
             if (blockquote && blockquote.cite) urlToOpen = blockquote.cite;
             else urlToOpen = pageUrl;
             
             const displayTitle = d.title || 'Instagram Post (클릭 시 원본 이동)';
             
             // Embed Code를 직접 삽입하여 인스타그램 미리보기가 렌더링되도록 함.
             // z-index를 사용하여 제목 오버레이가 임베드 위에 오도록 설정.
             // 인스타그램 임베드는 높이가 가변적이며, Masonry 레이아웃이 이를 처리하도록 기대함.
             iconHtml = `
                <div class="w-full h-full relative z-0">
                    ${d.embedCode || ''}
                    <div class="absolute top-0 left-0 right-0 p-2 bg-black bg-opacity-70 text-white text-sm font-bold z-10">${displayTitle}</div>
                </div>
             `;

        } else if (isVideo && !thumbnail) {
            // **수정된 부분: 썸네일 없는 비디오를 위한 새로운 제목 오버레이 스타일 적용**
            const displayTitle = d.title || '동영상 북마크 (제목 편집 가능)';
            const displayUrl = pageUrl.replace(/^https?:\/\//, '').substring(0, 30) + '...';
            
            iconHtml = `<div class="video-title-overlay">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-400 mb-2" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l12 8-12 8z"/></svg>
                            <span class="video-title-text">${displayTitle}</span>
                            <span class="video-url-text">${displayUrl}</span>
                        </div>`;
        } else if (isImage) {
            // [수정] 이미지 북마크인 경우 (썸네일은 이미지 URL 자체)
            iconHtml = `<img src="${imageUrl}" alt="북마크된 이미지" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='https://placehold.co/100x120/444/fff?text=이미지+오류'"/>`;
        } else if (isVideo) {
            // [수정] 유튜브 동영상이고 썸네일이 있는 경우
            const displayTitle = d.title || 'YouTube 영상';
            iconHtml = `<img src="${thumbnail}" alt="동영상 썸네일" loading="lazy" decoding="async" class="img-fit-cover" onerror="this.onerror=null;this.src='https://placehold.co/100x120/444/fff?text=동영상+썸네일'"/>
                        <div class="icon-overlay flex-col">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4l12 8-12 8z"/></svg>
                            <span class="text-xs mt-1 font-bold">${displayTitle}</span>
                        </div>`;
        } else {
             // 예외 처리 (알 수 없는 타입)
             iconHtml = `<div class="link-title-overlay">
                            <span class="link-title-text">알 수 없는 북마크</span>
                        </div>`;
        }

        const card=document.createElement('div');
        card.className='bookmark-card relative group cursor-pointer';
        card.innerHTML=`
          <div class="content">
            ${iconHtml}
          </div>
          <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-50 text-white text-xs px-2 py-1 truncate z-10 opacity-70">
              ${sourceDomain}
          </div>
          <button class="absolute top-2 right-2 bg-[#424242] text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity z-20" data-id="${d.id}" data-action="delete">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
          ${isEditable ? `
          <button class="absolute top-2 right-9 bg-blue-600 hover:bg-blue-700 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity z-20" data-id="${d.id}" data-action="edit">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
          </button>
          ` : ''}
          `;
        imageGrid.appendChild(card);
        
        // 클릭 이벤트 (Card Main Action)
        card.addEventListener('click',(e)=>{
            // 삭제나 편집 버튼을 누른 경우는 무시
            if (e.target.closest('button[data-action]')) return; 

            if (isVideo || isLink || isInstagram) {
                // 인스타그램의 경우 URLToOpen을 사용 (퍼가기 코드에서 추출된 원본 URL)
                window.open(urlToOpen, '_blank');
            } else if (isImage) {
                // [수정] 이미지일 경우 모달 열기
                openImageModal(imageUrl, pageUrl, d);
            }
        });
      });
      
      // 버튼 이벤트 리스너 부착
      imageGrid.querySelectorAll('button[data-action]').forEach(btn=>{
        btn.onclick=async(e)=>{ 
          e.stopPropagation(); 
          const id=e.currentTarget.dataset.id;
          const action=e.currentTarget.dataset.action;
          const bookmark = window.imageBookmarks.find(d => d.id === id);

          if (action === 'delete') {
             try{ 
                 if(window.deleteImage) await window.deleteImage(id);
             }catch(err){ 
                 console.error(err); 
                 showAlert('북마크 삭제 중 오류가 발생했습니다.'); 
             }
          } else if (action === 'edit' && bookmark) {
             // 링크 북마크는 제목 수정 대신 "미리보기 이미지 붙여넣기" 모달을 사용
             if (bookmark.type === 'link') {
                 openPreviewUploadModal(bookmark);
             } else {
                 openEditModal(bookmark);
             }
          }
        };
      });
      
      // 인스타그램 임베드 스크립트 초기화 및 렌더링
      initializeInstagramEmbeds();
    };



    // ===== 노동요(YouTube) =====
    // 일반 embed iframe + YouTube postMessage 제어. 재생/일시정지는 iframe을 다시 만들지 않고 명령만 보냅니다.
    function escapeHtml(str){
      return String(str ?? '').replace(/[&<>"']/g, (m)=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
    }

    function extractYoutubeVideoId(url){
      if(!url) return null;
      const text = String(url).trim();
      try{
        const u = new URL(text.includes('://') ? text : 'https://' + text);
        const host = u.hostname.replace(/^www\./,'');
        if(host === 'youtu.be') return (u.pathname.split('/').filter(Boolean)[0] || '').slice(0,11);
        if(host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com')){
          if(u.searchParams.get('v')) return u.searchParams.get('v').slice(0,11);
          const parts = u.pathname.split('/').filter(Boolean);
          const keys = ['embed','shorts','live'];
          if(keys.includes(parts[0]) && parts[1]) return parts[1].slice(0,11);
        }
      }catch(_){/* 정규식 fallback */}
      const m = text.match(/(?:v=|youtu\.be\/|embed\/|shorts\/|live\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function normalizeYoutubeUrl(url){
      const id = extractYoutubeVideoId(url);
      return id ? `https://www.youtube.com/watch?v=${id}` : String(url || '').trim();
    }

    function looksAutoTitle(song){
      const t = String(song?.title || '').trim();
      return !!song?.autoTitle || !t || t === `YouTube ${song?.videoId}` || t === '제목 불러오기 실패' || /^YouTube [A-Za-z0-9_-]{11}$/.test(t);
    }

    function cleanYoutubeTitle(title){
      let t = String(title || '').trim();
      t = t.replace(/\s*-\s*YouTube\s*$/i, '').trim();
      t = t.replace(/^YouTube\s*[-:]\s*/i, '').trim();
      return t;
    }


    function parseYoutubeISODuration(iso){
      const m = String(iso || '').match(/^P(?:(\d+)D)?T?(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?$/);
      if(!m) return 0;
      return (Number(m[1]||0)*86400) + (Number(m[2]||0)*3600) + (Number(m[3]||0)*60) + Number(m[4]||0);
    }

    async function youtubeApiGet(path, params={}){
      if(!YOUTUBE_API_KEY) throw new Error('YouTube API 키가 없습니다.');
      const url = new URL(`https://www.googleapis.com/youtube/v3/${path}`);
      url.searchParams.set('key', YOUTUBE_API_KEY);
      Object.entries(params).forEach(([k,v])=>{
        if(v !== undefined && v !== null && String(v) !== '') url.searchParams.set(k, String(v));
      });
      const res = await fetch(url.toString(), {cache:'no-store'});
      const data = await res.json().catch(()=>({}));
      if(!res.ok){
        const msg = data?.error?.message || `${res.status} ${res.statusText}`;
        throw new Error(msg);
      }
      return data;
    }

    async function fetchYoutubeVideosMeta(videoIds){
      const ids = [...new Set((videoIds || []).filter(Boolean))];
      const meta = {};
      for(let i=0; i<ids.length; i+=50){
        const chunk = ids.slice(i, i+50);
        const data = await youtubeApiGet('videos', {
          part:'snippet,contentDetails',
          id:chunk.join(','),
          maxResults:50
        });
        (data.items || []).forEach(item=>{
          const seconds = parseYoutubeISODuration(item?.contentDetails?.duration);
          const channelTitle = cleanYoutubeArtistName(item?.snippet?.channelTitle || '');
          meta[item.id] = {
            videoId:item.id,
            title: cleanYoutubeTitle(item?.snippet?.title || `YouTube ${item.id}`),
            durationSeconds: seconds,
            durationText: formatWorkMusicDuration(seconds),
            thumbnail: item?.snippet?.thumbnails?.medium?.url || item?.snippet?.thumbnails?.default?.url || '',
            channelTitle,
            artist: channelTitle
          };
        });
      }
      return meta;
    }

    function formatWorkMusicDuration(seconds){
      const n = Math.floor(Number(seconds || 0));
      if(!Number.isFinite(n) || n <= 0) return '';
      const h = Math.floor(n / 3600);
      const m = Math.floor((n % 3600) / 60);
      const sec = n % 60;
      if(h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    function parseDurationTextToSeconds(text){
      const parts = String(text || '').trim().split(':').map(v=>Number(v));
      if(!parts.length || parts.some(v=>!Number.isFinite(v))) return 0;
      if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if(parts.length === 2) return parts[0]*60 + parts[1];
      return parts[0] || 0;
    }

    function parseDurationFromHtml(html){
      const text = String(html || '');
      const length = text.match(/"lengthSeconds"\s*:\s*"?(\d+)"?/i);
      if(length) return Number(length[1]) || 0;
      const dur = text.match(/"duration"\s*:\s*"PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?"/i);
      if(dur) return (Number(dur[1]||0)*3600) + (Number(dur[2]||0)*60) + Number(dur[3]||0);
      return 0;
    }

    async function fetchYoutubeDuration(videoIdOrUrl){
      const videoId = extractYoutubeVideoId(videoIdOrUrl) || String(videoIdOrUrl || '').trim();
      if(!videoId) return 0;
      try{
        const meta = await fetchYoutubeVideosMeta([videoId]);
        if(meta[videoId]?.durationSeconds) return meta[videoId].durationSeconds;
      }catch(err){ console.warn('YouTube API duration failed', err); }
      const cleanUrl = `https://www.youtube.com/watch?v=${videoId}`;
      const endpoints = [
        { type:'json', url:`https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}` },
        { type:'text', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cleanUrl)}` }
      ];
      for(const endpoint of endpoints){
        try{
          const res = await fetch(endpoint.url, {cache:'no-store'});
          if(!res.ok) continue;
          let html = '';
          if(endpoint.type === 'json'){
            const data = await res.json();
            html = data.contents || data.data || '';
          }else{
            html = await res.text();
          }
          const seconds = parseDurationFromHtml(html);
          if(seconds) return seconds;
        }catch(_){/* 다음 endpoint 시도 */}
      }
      return 0;
    }

    function parseTitleFromHtml(html){
      const text = String(html || '');
      const og = text.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
              || text.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:title["']/i)
              || text.match(/<title[^>]*>([^<]+)<\/title>/i);
      if(!og) return '';
      const textarea = document.createElement('textarea');
      textarea.innerHTML = og[1];
      return cleanYoutubeTitle(textarea.value);
    }

    async function fetchYoutubeTitle(url){
      const cleanUrl = normalizeYoutubeUrl(url);
      const videoId = extractYoutubeVideoId(cleanUrl);
      if(videoId){
        try{
          const meta = await fetchYoutubeVideosMeta([videoId]);
          if(meta[videoId]?.title) return meta[videoId].title;
        }catch(err){ console.warn('YouTube API title failed', err); }
      }
      const endpoints = [
        { type:'json', url:`https://www.youtube.com/oembed?format=json&url=${encodeURIComponent(cleanUrl)}` },
        { type:'json', url:`https://noembed.com/embed?url=${encodeURIComponent(cleanUrl)}` },
        { type:'json', url:`https://api.allorigins.win/get?url=${encodeURIComponent(cleanUrl)}` },
        { type:'text', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cleanUrl)}` }
      ];
      for(const endpoint of endpoints){
        try{
          const res = await fetch(endpoint.url, {cache:'no-store'});
          if(!res.ok) continue;
          if(endpoint.type === 'json'){
            const data = await res.json();
            const title = cleanYoutubeTitle(data.title || parseTitleFromHtml(data.contents || ''));
            if(title) return title;
          }else{
            const html = await res.text();
            const title = parseTitleFromHtml(html);
            if(title) return title;
          }
        }catch(_){/* 다음 endpoint 시도 */}
      }
      return '';
    }

    async function fillMissingWorkMusicTitles(){
      const songs = window.workMusicSongs || [];
      const targets = songs.filter(looksAutoTitle);

    async function fillMissingWorkMusicDurations(){

      let changed = false;

    function rememberWorkMusicDuration(index, seconds){
      const songs = getActiveWorkMusicSongs();
      const song = songs[index];
      const n = Math.floor(Number(seconds || 0));
      if(!song || !n || song.durationSeconds) return;
      song.durationSeconds = n;
      renderWorkMusic();
      clearTimeout(workMusicDurationSaveTimer);
      workMusicDurationSaveTimer = setTimeout(()=>window.cloudSaveWorkMusic?.(), 800);
    }

    function getWorkMusicNextIndex(step=1){
      const songs = getActiveWorkMusicSongs();
      if(!songs.length) return -1;
      const cur = Math.max(0, Number(window.workMusicCurrentIndex || 0));
      if(window.workMusicMode === 'random' && songs.length > 1){
        let next = cur;
        while(next === cur) next = Math.floor(Math.random()*songs.length);
        return next;
      }
      return (cur + step + songs.length) % songs.length;
    }

    function shuffledWorkMusicIndexes(startIndex){
      const songs = getActiveWorkMusicSongs();
      const indexes = songs.map((_, i)=>i).filter(i=>i!==startIndex);
      for(let i=indexes.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
      }
      return [startIndex, ...indexes];
    }

    function getWorkMusicPlayOrder(startIndex){
      const songs = getActiveWorkMusicSongs();
      if(!songs.length) return [];
      if(window.workMusicMode === 'random') return shuffledWorkMusicIndexes(startIndex);
      return songs.map((_, offset)=>(startIndex + offset) % songs.length);
    }

    function getWorkMusicDisplayOrder(songs){
      const count = songs.length;
      if(!count) return [];
      if(window.workMusicMode !== 'random') return songs.map((_, i)=>i);
      const activeTabId = getActiveWorkMusicTabId();
      const idsKey = songs.map(s=>s.id || s.videoId || '').join('|');
      const cache = window.__workMusicDisplayShuffle || {};
      const cached = cache[activeTabId];
      if(cached && cached.idsKey === idsKey && Array.isArray(cached.order) && cached.order.length === count){
        return cached.order.filter(i=>i>=0 && i<count);
      }
      const order = songs.map((_, i)=>i);
      for(let i=order.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      window.__workMusicDisplayShuffle = {...cache, [activeTabId]: {idsKey, order}};
      return order;
    }


    function getWorkMusicInitialDisplayIndex(songs=getActiveWorkMusicSongs()){
      if(!songs.length) return 0;
      if(window.workMusicMode !== 'random') return 0;
      const order = getWorkMusicDisplayOrder(songs);
      return Number.isInteger(order[0]) ? order[0] : 0;
    }

    function resetWorkMusicDisplayShuffle(tabId=getActiveWorkMusicTabId()){
      window.__workMusicDisplayShuffle = window.__workMusicDisplayShuffle || {};
      delete window.__workMusicDisplayShuffle[tabId];
    }

    function sendWorkMusicCommand(func, args=[]){
      try{
        if(workMusicPlayer && typeof workMusicPlayer[func] === 'function'){
          workMusicPlayer[func](...(args || []));
          return;
        }
        if(!workMusicIframe?.contentWindow) return;
        workMusicIframe.contentWindow.postMessage(JSON.stringify({event:'command', func, args}), '*');
      }catch(err){ console.warn('YouTube command failed', err); }
    }

    function renderWorkMusicVolumeUI(){
      const raw = Math.max(0, Math.min(100, Number(window.workMusicVolume ?? 80)));
      const muted = !!window.workMusicIsMuted || raw === 0;
      const display = muted ? 0 : raw;
      if(workMusicVolumeRange) workMusicVolumeRange.value = String(display);
      if(workMusicVolumePercent) workMusicVolumePercent.textContent = `${display}%`;
      if(workMusicRemoteVolumeRange) workMusicRemoteVolumeRange.value = String(display);
      if(workMusicRemoteVolumePercent) workMusicRemoteVolumePercent.textContent = `${display}%`;
      if(workMusicMuteBtn){
        workMusicMuteBtn.innerHTML = muted ? workMusicMutedSvg : workMusicVolumeSvg;
        workMusicMuteBtn.title = muted ? '음소거 해제' : '음소거';
        workMusicMuteBtn.setAttribute('aria-label', muted ? '음소거 해제' : '음소거');
      }
      if(workMusicRemoteMuteBtn){
        workMusicRemoteMuteBtn.innerHTML = muted ? workMusicMutedSvg : workMusicVolumeSvg;
        workMusicRemoteMuteBtn.title = muted ? '음소거 해제' : '음소거';
        workMusicRemoteMuteBtn.setAttribute('aria-label', muted ? '음소거 해제' : '음소거');
      }

    function applyWorkMusicVolume(){
      const raw = Math.max(0, Math.min(100, Number(window.workMusicVolume ?? 80)));
      const muted = !!window.workMusicIsMuted || raw === 0;
      const playerVolume = muted ? 0 : raw;
      renderWorkMusicVolumeUI();
      sendWorkMusicCommand('setVolume', [playerVolume]);
      if(muted) sendWorkMusicCommand('mute'); else sendWorkMusicCommand('unMute');
    }

    async function setWorkMusicVolume(value, {save=true}={}){
      const v = Math.max(0, Math.min(100, Math.round(Number(value || 0) / 5) * 5));
      window.workMusicVolume = v;
      window.workMusicIsMuted = v === 0;
      if(v > 0) window.workMusicLastVolume = v;
      applyWorkMusicVolume();
      if(save) await window.cloudSaveWorkMusic?.();
    }

    async function toggleWorkMusicMute(){
      if(window.workMusicIsMuted || Number(window.workMusicVolume || 0) === 0){
        const restore = Math.max(5, Math.min(100, Number(window.workMusicLastVolume || 80)));
        window.workMusicVolume = restore;
        window.workMusicIsMuted = false;
      }else{
        window.workMusicLastVolume = Math.max(5, Number(window.workMusicVolume || 80));
        window.workMusicIsMuted = true;
      }
      applyWorkMusicVolume();
      await window.cloudSaveWorkMusic?.();
    }


    function ensureYouTubeIframeAPI(){
      if(window.YT && window.YT.Player) return Promise.resolve();
      if(window.__workMusicYTApiPromise) return window.__workMusicYTApiPromise;
      window.__workMusicYTApiPromise = new Promise((resolve)=>{
        const prev = window.onYouTubeIframeAPIReady;
        window.onYouTubeIframeAPIReady = function(){
          if(typeof prev === 'function') try{ prev(); }catch(_){/* ignore */}
          resolve();
        };
        if(!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')){
          const tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          document.head.appendChild(tag);
        }
        const check = setInterval(()=>{
          if(window.YT && window.YT.Player){ clearInterval(check); resolve(); }
        }, 200);
      });
      return window.__workMusicYTApiPromise;
    }

    function syncWorkMusicFromPlayer(){
      try{
        if(!workMusicPlayer || typeof workMusicPlayer.getPlaylistIndex !== 'function') return;
        const ytIndex = Number(workMusicPlayer.getPlaylistIndex());
        const order = window.workMusicCurrentPlayOrder || [];
        const mapped = Number.isFinite(ytIndex) ? order[ytIndex] : undefined;
        const songs = getActiveWorkMusicSongs();
        if(Number.isInteger(mapped) && mapped >= 0 && mapped < songs.length && mapped !== Number(window.workMusicCurrentIndex || 0)){
          window.workMusicCurrentIndex = mapped;
          renderWorkMusic();
          window.cloudSaveWorkMusic?.();
        }
        if(Number.isInteger(Number(window.workMusicCurrentIndex)) && typeof workMusicPlayer.getDuration === 'function'){
          const seconds = workMusicPlayer.getDuration();
          rememberWorkMusicDuration(Number(window.workMusicCurrentIndex || 0), seconds);
        }
      }catch(err){ console.warn('work music sync failed', err); }
    }

    function startWorkMusicSyncTimer(){
      clearInterval(workMusicSyncTimer);
      workMusicSyncTimer = setInterval(syncWorkMusicFromPlayer, 900);
    }

    function stopWorkMusicSyncTimer(){
      clearInterval(workMusicSyncTimer);
      workMusicSyncTimer = null;
    }

    function onWorkMusicPlayerStateChange(event){
      const state = event?.data;
      if(window.YT && state === window.YT.PlayerState.PLAYING){
        window.workMusicIsPlaying = true;
        syncWorkMusicFromPlayer();
        renderWorkMusicPlayButton();
        renderWorkMusic();
        startWorkMusicSyncTimer();
      }else if(window.YT && (state === window.YT.PlayerState.PAUSED || state === window.YT.PlayerState.ENDED)){
        window.workMusicIsPlaying = false;
        renderWorkMusicPlayButton();
        renderWorkMusic();
        if(state === window.YT.PlayerState.PAUSED) stopWorkMusicSyncTimer();
      }
    }

    async function renderWorkMusicIframe(index, autoplay=true){
      const box = document.getElementById('workMusicPlayerBox');
      const songs = getActiveWorkMusicSongs();
      if(!box) return;
      stopWorkMusicSyncTimer();
      if(workMusicPlayer && typeof workMusicPlayer.destroy === 'function'){
        try{ workMusicPlayer.destroy(); }catch(_){/* ignore */}
      }
      workMusicPlayer = null;
      workMusicIframe = null;
      if(!songs.length){
        box.innerHTML = '<div style="color:#777;padding:24px;text-align:center">유튜브 링크를 추가하면 여기에 재생됩니다.</div>';
        window.workMusicIsPlaying = false;
        window.workMusicCurrentPlayOrder = [];
        renderWorkMusicPlayButton();
        updateWorkMusicRemoteUI();
        return;
      }
      if(index < 0 || index >= songs.length) index = 0;
      const song = songs[index];
      if(!song?.videoId){
        box.innerHTML = '<div style="color:#777;padding:24px;text-align:center">유튜브 링크를 확인해주세요.</div>';
        window.workMusicIsPlaying = false;

              ${isActive && window.workMusicIsPlaying ? workMusicPauseSvg : workMusicPlaySvg}
            </div>

              <div class="workmusic-music-title">${escapeHtml(title)}</div>

            <div class="workmusic-actions">

          row.innerHTML=`
            <img class="workmusic-thumb" src="${escapeHtml(thumbSrc)}" alt="썸네일" onerror="this.onerror=null;this.src='https://placehold.co/320x180/333/fff?text=YouTube'">
            <div class="workmusic-play-overlay">
              ${isActive && window.workMusicIsPlaying ? workMusicPauseSvg : workMusicPlaySvg}

    function extractYoutubePlaylistId(raw){
      const text = String(raw || '').trim();
      if(!text) return null;
      try{
        const u = new URL(text.includes('://') ? text : 'https://' + text);
        const list = u.searchParams.get('list');
        if(list && list.length >= 10) return list;
      }catch(_){/* regex fallback */}
      const m = text.match(/[?&]list=([A-Za-z0-9_-]+)/) || text.match(/(?:playlist\?list=)([A-Za-z0-9_-]+)/);
      return m ? m[1] : null;
    }

    function isYoutubeMusicUrl(raw){
      try{
        const u = new URL(String(raw || '').includes('://') ? String(raw || '') : 'https://' + String(raw || ''));
        return u.hostname.replace(/^www\./,'').toLowerCase().includes('music.youtube.com');
      }catch(_){ return /music\.youtube\.com/i.test(String(raw || '')); }
    }

    function cleanYoutubeArtistName(name){
      return String(name || '').trim()
        .replace(/\s*-\s*Topic$/i, '')
        .replace(/\s*-\s*Official$/i, '')
        .replace(/\s*VEVO$/i, '')
        .trim();
    }

    function getSongArtist(song){
      const explicit = cleanYoutubeArtistName(song?.artist || song?.channelTitle || song?.ownerChannelTitle || '');
      if(explicit) return explicit;
      const title = String(song?.title || '');
      const parts = title.split(/\s[-–—]\s/);
      if(parts.length >= 2) return cleanYoutubeArtistName(parts[0]);
      return '';
    }

    function decodeHtmlEntities(str){
      const textarea = document.createElement('textarea');
      textarea.innerHTML = String(str || '');
      return textarea.value;
    }

    function extractYtInitialData(html){
      const text = String(html || '');
      const key = 'ytInitialData';
      let pos = text.indexOf(key);
      if(pos < 0) return null;
      pos = text.indexOf('{', pos);
      if(pos < 0) return null;
      let depth = 0, inString = false, esc = false;
      for(let i=pos; i<text.length; i++){
        const ch = text[i];
        if(inString){
          if(esc) esc = false;
          else if(ch === '\\') esc = true;
          else if(ch === '"') inString = false;
          continue;
        }
        if(ch === '"'){ inString = true; continue; }
        if(ch === '{') depth++;
        else if(ch === '}'){
          depth--;
          if(depth === 0){
            try{ return JSON.parse(text.slice(pos, i+1)); }catch(_){ return null; }
          }
        }
      }
      return null;
    }

    function ytText(node){
      if(!node) return '';
      if(typeof node === 'string') return node;
      if(node.simpleText) return String(node.simpleText);
      if(Array.isArray(node.runs)) return node.runs.map(r=>r.text || '').join('').trim();
      return '';
    }

    function parsePlaylistFeedXml(xmlText, playlistId){
      const items = [];
      const seen = new Set();
      let playlistTitle = '';
      try{
        const xml = new DOMParser().parseFromString(String(xmlText || ''), 'text/xml');
        const feedTitle = xml.querySelector('feed > title');
        playlistTitle = cleanYoutubeTitle(feedTitle?.textContent || '새 재생목록');
        xml.querySelectorAll('entry').forEach(entry=>{
          const videoId = entry.querySelector('videoId, yt\\:videoId')?.textContent?.trim();
          const title = cleanYoutubeTitle(entry.querySelector('title')?.textContent || '');
          const thumb = entry.querySelector('thumbnail, media\\:thumbnail')?.getAttribute('url') || '';
          if(videoId && !seen.has(videoId)){
            seen.add(videoId);
            items.push({
              videoId,
              title: title || `YouTube ${videoId}`,
              thumbnail: thumb,
              durationText: '',
              durationSeconds: 0
            });
          }
        });
      }catch(err){ console.warn('playlist feed parse failed', err); }
      return { title: playlistTitle || '새 재생목록', items, playlistId };
    }

    function parsePlaylistFromHtml(html, playlistId){
      const items = [];
      const seen = new Set();
      let playlistTitle = '';
      const data = extractYtInitialData(html);
      const visit = (node)=>{
        if(!node || typeof node !== 'object') return;
        if(node.playlistVideoRenderer){
          const r = node.playlistVideoRenderer;
          const videoId = r.videoId;
          const title = cleanYoutubeTitle(ytText(r.title));
          const durationText = ytText(r.lengthText) || ytText(r.thumbnailOverlays?.find?.(o=>o.thumbnailOverlayTimeStatusRenderer)?.thumbnailOverlayTimeStatusRenderer?.text);
          const durationSeconds = parseDurationTextToSeconds(durationText);
          const thumb = r.thumbnail?.thumbnails?.slice?.(-1)?.[0]?.url || '';
          if(videoId && !seen.has(videoId)){
            seen.add(videoId);
            items.push({videoId, title: title || `YouTube ${videoId}`, thumbnail: thumb, durationText: durationText || '', durationSeconds: durationSeconds || 0});
          }
        }
        if(node.videoId && node.title && !node.playlistVideoRenderer){
          const videoId = node.videoId;
          const title = cleanYoutubeTitle(ytText(node.title));
          if(/^[A-Za-z0-9_-]{11}$/.test(videoId) && !seen.has(videoId)){
            seen.add(videoId);
            items.push({videoId, title: title || `YouTube ${videoId}`, durationText:'', durationSeconds:0});
          }
        }
        if(node.playlistMetadataRenderer?.title && !playlistTitle){
          playlistTitle = cleanYoutubeTitle(node.playlistMetadataRenderer.title);
        }
        if(node.playlistHeaderRenderer?.title && !playlistTitle){
          playlistTitle = cleanYoutubeTitle(ytText(node.playlistHeaderRenderer.title));
        }
        if(node.microformatDataRenderer?.title && !playlistTitle){
          playlistTitle = cleanYoutubeTitle(node.microformatDataRenderer.title);
        }
        for(const v of Object.values(node)){
          if(v && typeof v === 'object'){
            if(Array.isArray(v)) v.forEach(visit); else visit(v);
          }
        }
      };
      if(data) visit(data);

      if(!items.length){
        const htmlText = String(html || '');
        const re = /"playlistVideoRenderer"\s*:\s*\{[\s\S]*?"videoId"\s*:\s*"([A-Za-z0-9_-]{11})"[\s\S]*?"title"\s*:\s*\{\s*"runs"\s*:\s*\[\s*\{\s*"text"\s*:\s*"([\s\S]*?)"/g;
        let m;
        while((m = re.exec(htmlText))){
          const videoId = m[1];
          if(seen.has(videoId)) continue;
          seen.add(videoId);
          items.push({videoId, title: cleanYoutubeTitle(decodeHtmlEntities(m[2].replace(/\\u0026/g, '&'))) || `YouTube ${videoId}`, durationText:'', durationSeconds:0});
        }
      }
      if(!items.length){
        const htmlText = String(html || '');
        const re = /"videoId"\s*:\s*"([A-Za-z0-9_-]{11})"/g;
        let m;
        while((m = re.exec(htmlText))){
          const videoId = m[1];
          if(seen.has(videoId)) continue;
          seen.add(videoId);
          items.push({videoId, title:`YouTube ${videoId}`, durationText:'', durationSeconds:0});
        }
      }
      if(!playlistTitle){
        const og = String(html||'').match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']+)["']/i)
                || String(html||'').match(/<title[^>]*>([^<]+)<\/title>/i);
        if(og) playlistTitle = cleanYoutubeTitle(decodeHtmlEntities(og[1]).replace(/\s*-\s*YouTube\s*$/i,''));
      }
      return { title: playlistTitle || '새 재생목록', items, playlistId };
    }

    async function fetchTextThroughProxies(targetUrl){
      const endpoints = [
        {type:'text', url:`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`},
        {type:'json', url:`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`},
        {type:'text', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`},
        {type:'text', url:`https://corsproxy.io/?${encodeURIComponent(targetUrl)}`}
      ];
      let lastError = '';
      for(const endpoint of endpoints){
        try{
          const res = await fetch(endpoint.url, {cache:'no-store'});
          if(!res.ok){ lastError = `${res.status} ${res.statusText}`; continue; }
          if(endpoint.type === 'json'){
            const data = await res.json();
            const text = data.contents || data.data || '';
            if(text) return text;
          }else{
            const text = await res.text();
            if(text) return text;
          }
        }catch(err){ lastError = err?.message || String(err); console.warn('playlist proxy failed', endpoint.url, err); }
      }
      console.warn('playlist all proxies failed', targetUrl, lastError);
      return '';
    }

    async function fetchYoutubePlaylistData(playlistId){
      const cleanId = String(playlistId || '').trim();
      if(!cleanId) return { title:'새 재생목록', items:[], playlistId:cleanId };

      // 1차: YouTube Data API v3. 공개/일부공개 재생목록은 이 방식이 가장 안정적입니다.
      try{
        let playlistTitle = '새 재생목록';
        try{
          const plist = await youtubeApiGet('playlists', {part:'snippet', id:cleanId, maxResults:1});
          playlistTitle = cleanYoutubeTitle(plist?.items?.[0]?.snippet?.title || playlistTitle);
        }catch(err){ console.warn('YouTube API playlist title failed', err); }

        const rawItems = [];
        let pageToken = '';
        do{
          const data = await youtubeApiGet('playlistItems', {
            part:'snippet,contentDetails',
            playlistId:cleanId,
            maxResults:50,
            pageToken
          });
          (data.items || []).forEach(item=>{
            const videoId = item?.contentDetails?.videoId || item?.snippet?.resourceId?.videoId;
            const title = cleanYoutubeTitle(item?.snippet?.title || '');
            // 삭제/비공개 영상은 제목이 이런 식으로 내려올 수 있으므로 제외
            if(!videoId || /^Deleted video$/i.test(title) || /^Private video$/i.test(title)) return;
            rawItems.push({videoId, title: title || `YouTube ${videoId}`, ownerChannelTitle: cleanYoutubeArtistName(item?.snippet?.videoOwnerChannelTitle || item?.snippet?.channelTitle || '')});
          });
          pageToken = data.nextPageToken || '';
        }while(pageToken);

        if(rawItems.length){
          const meta = await fetchYoutubeVideosMeta(rawItems.map(v=>v.videoId)).catch(err=>{
            console.warn('YouTube API videos meta failed', err);
            return {};
          });
          const seen = new Set();
          const items = rawItems.filter(v=>{
            if(seen.has(v.videoId)) return false;
            seen.add(v.videoId);
            return true;
          }).map(v=>({
            videoId: v.videoId,
            title: meta[v.videoId]?.title || v.title || `YouTube ${v.videoId}`,
            durationSeconds: meta[v.videoId]?.durationSeconds || 0,
            durationText: meta[v.videoId]?.durationText || '',
            thumbnail: meta[v.videoId]?.thumbnail || '',
            artist: meta[v.videoId]?.artist || v.ownerChannelTitle || '',
            channelTitle: meta[v.videoId]?.channelTitle || v.ownerChannelTitle || ''
          }));
          return { title: playlistTitle || '새 재생목록', items, playlistId:cleanId };
        }
      }catch(err){
        console.warn('YouTube API playlist failed. fallback start:', err);
      }

      const feedUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=${encodeURIComponent(cleanId)}`;
      const playlistUrl = `https://www.youtube.com/playlist?list=${encodeURIComponent(cleanId)}`;
      const musicPlaylistUrl = `https://music.youtube.com/playlist?list=${encodeURIComponent(cleanId)}`;

      // 2차: YouTube 공식 RSS 피드.
      const feedText = await fetchTextThroughProxies(feedUrl);
      if(feedText){
        const parsedFeed = parsePlaylistFeedXml(feedText, cleanId);
        if(parsedFeed.items.length) return parsedFeed;
      }

      // 3차: 일반 YouTube 재생목록 페이지 HTML 파싱.
      const html = await fetchTextThroughProxies(playlistUrl);
      if(html){
        const parsed = parsePlaylistFromHtml(html, cleanId);
        if(parsed.items.length) return parsed;
      }

      // 4차: YouTube Music 재생목록 페이지 HTML 파싱.
      const musicHtml = await fetchTextThroughProxies(musicPlaylistUrl);
      if(musicHtml){
        const parsedMusic = parsePlaylistFromHtml(musicHtml, cleanId);
        if(parsedMusic.items.length) return parsedMusic;
      }

      return { title:'새 재생목록', items:[], playlistId:cleanId };
    }

    async function importWorkMusicPlaylistFromLink(raw){
      if(!window.ensureLogin || !window.ensureLogin()) return;
      const playlistId = extractYoutubePlaylistId(raw);
      if(!playlistId){ showAlert('유튜브/유튜브뮤직 재생목록 링크를 넣어주세요.'); return; }
      showFeedbackMessage('재생목록을 불러오는 중입니다...');
      const data = await fetchYoutubePlaylistData(playlistId);
      const playlistSourceType = isYoutubeMusicUrl(raw) ? 'youtube-music-playlist' : 'youtube-playlist';
      if(!data.items.length){
        showAlert('재생목록을 읽지 못했습니다. 공개 재생목록인지 확인해주세요.');
        return;
      }
      ensureWorkMusicDefaultTabs();
      const tabs = getWorkMusicTabs();
      const id = 'wtab_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
      const order = tabs.length ? Math.max(...tabs.map(t=>Number(t.order||0))) + 10 : 0;
      const tabName = (data.title || '새 재생목록').trim().slice(0, 20) || '새 재생목록';
      window.__workMusicTabList = [...tabs, {id, name: tabName, order, sourcePlaylistId: data.playlistId, sourceType: playlistSourceType}];
      window.__workMusicActiveTabId = id;
      const existingIds = new Set((window.workMusicSongs || []).map(s=>`${s.workMusicTabId || 'default'}:${s.videoId}`));
      const now = Date.now();
      const newSongs = data.items
        .filter(item => item.videoId && !existingIds.has(`${id}:${item.videoId}`))
        .map((item, idx)=>({
          id: now + idx,
          url: `https://www.youtube.com/watch?v=${item.videoId}`,
          videoId: item.videoId,
          title: item.title || `YouTube ${item.videoId}`,

    async function addWorkMusicFromText(raw){

      window.workMusicSongs = window.workMusicSongs || [];
      const url = normalizeYoutubeUrl(raw);
      const activeTabId = getActiveWorkMusicTabId();
      if(getActiveWorkMusicSongs().some(s=>s.videoId===videoId)){ showFeedbackMessage('현재 탭에 이미 추가된 영상입니다.'); return false; }
      let meta = {};
      try{ meta = await fetchYoutubeVideosMeta([videoId]); }catch(_){ meta = {}; }
      const fetchedTitle = meta[videoId]?.title || await fetchYoutubeTitle(url);
      const durationSeconds = meta[videoId]?.durationSeconds || await fetchYoutubeDuration(videoId);
      const activeTab = getWorkMusicTabs().find(t=>t.id===activeTabId);
      const sourceType = isYoutubeMusicUrl(raw) || String(activeTab?.sourceType || '').includes('music') ? 'youtube-music' : 'youtube';
      window.workMusicSongs.push({ id: Date.now(), url, videoId, title:fetchedTitle || `제목 불러오기 실패`, artist:meta[videoId]?.artist || '', channelTitle:meta[videoId]?.channelTitle || '', thumbnail:meta[videoId]?.thumbnail || '', autoTitle: !fetchedTitle, durationSeconds: durationSeconds || 0, durationText: formatWorkMusicDuration(durationSeconds), addedAt: Date.now(), workMusicTabId: activeTabId, sourceType });

        const els = [...container.querySelectorAll('.workmusic-tab:not(.dragging):not(.placeholder)')];

        for(const child of els){
          const box = child.getBoundingClientRect();
